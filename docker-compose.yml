services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:5173
    depends_on:
      - redis

  redis:
    image: redis:alpine
    # no ports: only the backend (same network) can connect; not exposed to host

volumes:
  hf-cache:
