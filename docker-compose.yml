services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    # no ports: only the backend (same network) can connect; not exposed to host

volumes:
  hf-cache:
  redis-data:
